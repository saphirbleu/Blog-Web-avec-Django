<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mon Blog{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{% url 'accueil' %}">Mon Blog</a>

    <div class="ms-auto">
      <a href="{% url 'ajouter' %}" class="btn btn-outline-light btn-sm">
        + Ajouter
      </a>
    </div>
  </div>
</nav>

<!-- CONTENU -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
